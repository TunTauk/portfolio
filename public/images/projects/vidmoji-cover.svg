<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0f172a"/>
  <rect width="800" height="450" fill="url(#grid)"/>
  <ellipse cx="400" cy="225" rx="320" ry="180" fill="url(#glow)"/>

  <!-- Camera icon -->
  <g transform="translate(272, 148)">
    <rect x="0" y="8" width="56" height="42" rx="6" fill="none" stroke="#8b5cf6" stroke-width="3"/>
    <polygon points="56,18 72,10 72,48 56,40" fill="#8b5cf6" opacity="0.7"/>
    <circle cx="22" cy="29" r="8" fill="#8b5cf6" opacity="0.5"/>
  </g>

  <!-- Hand emoji floating -->
  <text x="350" y="165" font-size="28" text-anchor="middle">✋</text>
  <text x="390" y="145" font-size="22" text-anchor="middle">✌️</text>
  <text x="430" y="168" font-size="26" text-anchor="middle">🤟</text>

  <!-- Title -->
  <text x="400" y="222" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="46" font-weight="800" fill="#f8fafc" letter-spacing="-1">Vidmoji</text>
  <text x="400" y="262" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="400" fill="#8b5cf6" letter-spacing="0.5">Real-time Gesture → Emoji</text>

  <!-- Divider -->
  <rect x="300" y="278" width="200" height="2" rx="1" fill="#1e293b"/>

  <!-- Tech pills -->
  <rect x="272" y="292" width="72" height="22" rx="11" fill="rgba(139,92,246,0.15)"/>
  <text x="308" y="307" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#8b5cf6">MediaPipe</text>

  <rect x="352" y="292" width="60" height="22" rx="11" fill="rgba(139,92,246,0.15)"/>
  <text x="382" y="307" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#8b5cf6">OpenCV</text>

  <rect x="420" y="292" width="52" height="22" rx="11" fill="rgba(139,92,246,0.15)"/>
  <text x="446" y="307" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#8b5cf6">Python</text>

  <!-- GitHub link -->
  <text x="400" y="350" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#475569">github.com/tuntauk/vidmoji</text>
</svg>
