<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0f172a"/>
  <rect width="800" height="450" fill="url(#grid)"/>
  <ellipse cx="400" cy="225" rx="320" ry="180" fill="url(#glow)"/>

  <!-- TT monogram -->
  <g transform="translate(248, 118)">
    <!-- First T -->
    <rect x="0" y="0" width="56" height="14" rx="4" fill="#f97316"/>
    <rect x="20" y="14" width="16" height="66" rx="4" fill="#f97316"/>
    <!-- Second T -->
    <rect x="66" y="0" width="56" height="14" rx="4" fill="#f97316" opacity="0.6"/>
    <rect x="86" y="14" width="16" height="66" rx="4" fill="#f97316" opacity="0.6"/>
  </g>

  <!-- Title -->
  <text x="390" y="172" font-family="'Segoe UI', Arial, sans-serif" font-size="40" font-weight="800" fill="#f8fafc" letter-spacing="-1">Portfolio</text>
  <text x="390" y="212" font-family="'Segoe UI', Arial, sans-serif" font-size="21" font-weight="400" fill="#f97316" letter-spacing="1">Personal Website</text>

  <!-- Divider -->
  <rect x="390" y="230" width="220" height="2" rx="1" fill="#1e293b"/>

  <!-- Tech pills -->
  <rect x="390" y="246" width="58" height="22" rx="11" fill="rgba(249,115,22,0.15)"/>
  <text x="419" y="261" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#f97316">Astro</text>

  <rect x="456" y="246" width="80" height="22" rx="11" fill="rgba(96,165,250,0.12)"/>
  <text x="496" y="261" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#60a5fa">TypeScript</text>

  <rect x="544" y="246" width="72" height="22" rx="11" fill="rgba(52,211,153,0.12)"/>
  <text x="580" y="261" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#34d399">Tailwind</text>

  <!-- URL -->
  <text x="390" y="308" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#475569">tt.ideafresh.dev</text>
</svg>
