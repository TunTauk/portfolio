<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0f172a"/>
  <rect width="800" height="450" fill="url(#grid)"/>
  <ellipse cx="400" cy="225" rx="320" ry="180" fill="url(#glow)"/>

  <!-- LeetCode icon (simplified L-shape) -->
  <g transform="translate(268, 120)">
    <rect x="0" y="0" width="14" height="80" rx="4" fill="#f97316"/>
    <rect x="0" y="66" width="56" height="14" rx="4" fill="#f97316"/>
    <rect x="56" y="40" width="14" height="40" rx="4" fill="#f97316" opacity="0.5"/>
  </g>

  <!-- Title -->
  <text x="370" y="175" font-family="'Segoe UI', Arial, sans-serif" font-size="42" font-weight="800" fill="#f8fafc" letter-spacing="-1">LeetCode</text>
  <text x="370" y="218" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="400" fill="#f97316" letter-spacing="1">Solutions Repository</text>

  <!-- Divider -->
  <rect x="370" y="235" width="200" height="2" rx="1" fill="#1e293b"/>

  <!-- Difficulty pills -->
  <rect x="370" y="252" width="56" height="22" rx="11" fill="rgba(34,197,94,0.15)"/>
  <text x="398" y="267" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#22c55e">Easy</text>

  <rect x="434" y="252" width="72" height="22" rx="11" fill="rgba(234,179,8,0.15)"/>
  <text x="470" y="267" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#eab308">Medium</text>

  <rect x="514" y="252" width="52" height="22" rx="11" fill="rgba(239,68,68,0.15)"/>
  <text x="540" y="267" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#ef4444">Hard</text>

  <!-- GitHub link -->
  <text x="370" y="310" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#475569">github.com/tuntauk/leetcode</text>
</svg>
